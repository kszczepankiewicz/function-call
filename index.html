<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Call</title>
    <link rel="stylesheet" href="../../dark-theme.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Function Call</h1>
    </header>
    <main>
        <section id="function-call">
            <form id="function-call-form">
                <label for="function-call-name-input">Name: </label>
                <input type="text" id="function-call-name-input">
                <label for="function-call-parameters-input">Parameters:</label><input type="text"
                    id="function-call-parameters-input">
                <button type="submit">Generate</button>
            </form>
            <pre id="result"></pre>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
